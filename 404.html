<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>

  <link rel="stylesheet" href="404.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<section class="error-page">

  <!-- Background Orbs -->
  <div class="error-bg">
    <span class="orb orb1"></span>
    <span class="orb orb2"></span>
    <span class="orb orb3"></span>
  </div>

  <!-- CONTENT -->
  <div class="error-container">

    <h1 class="error-code">404</h1>

    <h2 class="error-title">Page Not Found</h2>

    <p class="error-text">
      Looks like you’ve drifted into the void.
      The page you're searching for isn’t here anymore —
      but we can guide you back to something great.
    </p>

    <div class="error-actions">
      <a href="index.html" class="btn primary">Go Home</a>
      <button onclick="history.back()" class="btn ghost">Go Back</button>
    </div>

  </div>

</section>

</body>
</html>
